name: Bug report
description: Report a problem with the language server or VSCode extension.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this. Use this form for issues affecting either the language server or the VSCode extension.
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Where are you seeing the problem?
      options:
        - VSCode extension
        - Language server
        - Debugger
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Briefly describe the bug and what you expected instead.
      placeholder: The extension showed...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: How can it be reproduced?
      description: Optional. Share steps, a minimal example, or sample code if you have it.
      placeholder: |
        1. Open...
        2. Run...
        3. See...
    validations:
      required: false
  - type: textarea
    id: additional_info
    attributes:
      label: Additional info
      description: Optional. Share environment details, logs, errors, or screenshots that help explain the issue.
      placeholder: |
        VSCode version:
        Extension version:
        GLuaLS version:
        OS:
        Project structure/details:
        Logs:
        Screenshots:
    validations:
      required: false
