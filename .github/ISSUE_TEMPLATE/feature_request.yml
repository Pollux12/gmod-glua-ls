name: Feature request
description: Suggest an improvement for the language server or VSCode extension.
title: "[Suggestion]: "
labels:
  - suggestion
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Use this form for ideas affecting either the language server or the VSCode extension.
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part would this improve?
      options:
        - VSCode extension
        - Language server
        - Debugger
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the current pain point or limitation.
      placeholder: It is difficult to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to happen?
      description: Keep it simple and concrete.
      placeholder: I would like...
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Examples, mockups, related tools, or anything else helpful.
    validations:
      required: false
