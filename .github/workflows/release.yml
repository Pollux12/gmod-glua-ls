name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_ext: zip
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: zip
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Update version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cargo run -p edit_version -- "$VERSION"

      - name: Build emmylua_ls
        shell: bash
        run: cargo build --release --target ${{ matrix.target }} -p emmylua_ls

      - name: Build emmylua_check
        shell: bash
        run: cargo build --release --target ${{ matrix.target }} -p emmylua_check

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          chmod +x target/${{ matrix.target }}/release/emmylua_ls
          chmod +x target/${{ matrix.target }}/release/emmylua_check
          tar -czf dist/gmod-glua-ls-${{ matrix.target }}.${{ matrix.archive_ext }} \
            -C target/${{ matrix.target }}/release \
            emmylua_ls emmylua_check

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          chmod +x target/${{ matrix.target }}/release/emmylua_ls
          chmod +x target/${{ matrix.target }}/release/emmylua_check
          zip -j dist/gmod-glua-ls-${{ matrix.target }}.${{ matrix.archive_ext }} \
            target/${{ matrix.target }}/release/emmylua_ls \
            target/${{ matrix.target }}/release/emmylua_check

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Compress-Archive -Path @(
            "target/${{ matrix.target }}/release/emmylua_ls.exe",
            "target/${{ matrix.target }}/release/emmylua_check.exe"
          ) -DestinationPath "dist/gmod-glua-ls-${{ matrix.target }}.${{ matrix.archive_ext }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gmod-glua-ls-${{ matrix.target }}
          path: dist/gmod-glua-ls-*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: gmod-glua-ls ${{ github.ref_name }}
          draft: false
          generate_release_notes: true
          files: |
            gmod-glua-ls-*/gmod-glua-ls-*
