name: Test

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  CLICOLOR: 1

jobs:
  clippy:
    name: Clippy Lint Check
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Install Rust toolchain with clippy
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy
    - name: Rust cache
      uses: Swatinem/rust-cache@v2
    - name: Run Clippy
      run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Run Tests
        run: cargo test

  macos-check:
    name: Experimental macOS cargo check (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: macos-15
            target: aarch64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Check macOS binaries
        run: cargo check -p glua_ls -p glua_check --target ${{ matrix.target }}

  check-schema:
    name: Check schema generation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        id: toolchain
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
      - name: Check schema
        run: |
          # Generate schema
          cargo run --bin schema_json_gen
          # Check for uncommitted changes
          if [[ -n "$(git status --porcelain)" ]]; then
            echo '❌ Uncommitted changes detected after running `cargo run --bin schema_json_gen`:'
            git --no-pager diff
            exit 1
          else
            echo "✅ No changes — schema is up to date."
          fi
