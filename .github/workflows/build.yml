name: Rust

on:
  push:
    branches:
     - main
    tags:
     - "*.*.*"
  workflow_dispatch:
    inputs:
      channel:
        description: Optional release channel override for tag builds
        required: false
        type: choice
        options:
          - prerelease
          - stable
      version:
        description: Optional version validation for manual tag dispatch
        required: false
        type: string
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
     - main

jobs:
  changes:
    name: Detect build changes
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            rust:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'rust-toolchain.toml'
              - '.clippy.toml'
              - 'rustfmt.toml'
              - 'crates/**'
              - 'tools/**'
              - 'vendor/emmylua_codestyle/**'
              - '.github/workflows/build.yml'

  # Lightweight dev builds for every push/PR — Linux x64, Windows x64, and experimental macOS.
  build-dev:
    name: Dev Build (${{ matrix.platform }})
    needs: changes
    if: ${{ !startsWith(github.ref, 'refs/tags/') && needs.changes.outputs.rust == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-22.04,   target: x86_64-unknown-linux-gnu,  platform: linux-x64  }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,    platform: win32-x64  }
          - { os: macos-15-intel, target: x86_64-apple-darwin,        platform: darwin-x64-experimental  }
          - { os: macos-15,       target: aarch64-apple-darwin,       platform: darwin-arm64-experimental  }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: dev-${{ matrix.target }}
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Build
        run: |
          rustup target add ${{ matrix.target }}
          cargo build --release --target ${{ matrix.target }} -p glua_ls -p glua_check
      - name: Copy binary (Linux)
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          mkdir -p ${{ github.workspace }}/artifact/
          cp ${{ github.workspace }}/target/${{ matrix.target }}/release/glua_ls ${{ github.workspace }}/artifact/glua_ls
          cp ${{ github.workspace }}/target/${{ matrix.target }}/release/glua_check ${{ github.workspace }}/artifact/glua_check
      - name: Copy binary (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}/artifact/"
          Copy-Item "${{ github.workspace }}/target/${{ matrix.target }}/release/glua_ls.exe" "${{ github.workspace }}/artifact/glua_ls.exe"
          Copy-Item "${{ github.workspace }}/target/${{ matrix.target }}/release/glua_check.exe" "${{ github.workspace }}/artifact/glua_check.exe"
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: glua_ls-${{ matrix.platform }}-dev
          path: ${{ github.workspace }}/artifact/

  # Full release builds — only runs on tag pushes.
  # Produces the assets consumed by the VSCode extension (win32-x64 zip, linux glibc 2.17 tar.gz)
  # plus experimental macOS artifacts.
  build-release:
    name: Release Build (${{ matrix.platform }} / ${{ matrix.crate }})
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-22.04,   target: x86_64-unknown-linux-gnu, platform: linux-x64, cross: general,  crate: glua_ls, output: glua_ls }
          - { os: ubuntu-22.04,   target: x86_64-unknown-linux-gnu, platform: linux-x64, cross: zigbuild, crate: glua_ls, output: glua_ls, glibc: 2.17 }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,   platform: win32-x64, cross: general,  crate: glua_ls, output: glua_ls }
          - { os: macos-15-intel, target: x86_64-apple-darwin,       platform: darwin-x64-experimental, cross: general, crate: glua_ls, output: glua_ls }
          - { os: macos-15,       target: aarch64-apple-darwin,      platform: darwin-arm64-experimental, cross: general, crate: glua_ls, output: glua_ls }
          - { os: ubuntu-22.04,   target: x86_64-unknown-linux-gnu, platform: linux-x64, cross: general,  crate: glua_check, output: glua_check }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,   platform: win32-x64, cross: general,  crate: glua_check, output: glua_check }
          - { os: macos-15-intel, target: x86_64-apple-darwin,       platform: darwin-x64-experimental, cross: general, crate: glua_check, output: glua_check }
          - { os: macos-15,       target: aarch64-apple-darwin,      platform: darwin-arm64-experimental, cross: general, crate: glua_check, output: glua_check }
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ contains(matrix.platform, 'darwin') }}
    steps:
      - name: Preflight stable-release secrets
        shell: bash
        env:
          TAG_VERSION: ${{ github.ref_name }}
          CHANNEL_OVERRIDE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.channel || '' }}
          CARGO_TOKEN: ${{ secrets.CARGO_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
        run: |
          set -euo pipefail

          require_cargo="false"
          case "${CHANNEL_OVERRIDE}" in
            stable)
              require_cargo="true"
              ;;
            prerelease)
              require_cargo="false"
              ;;
            "")
              IFS='.' read -r _ _ patch <<< "${TAG_VERSION}"
              if (( patch == 0 )); then
                require_cargo="true"
              fi
              ;;
            *)
              echo "Unknown channel override '${CHANNEL_OVERRIDE}'." >&2
              exit 1
              ;;
          esac

          if [[ "${require_cargo}" == "true" && -z "${CARGO_TOKEN}" ]]; then
            echo "::error::CARGO_TOKEN is required for stable releases (crate publish path)."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}-${{ matrix.crate }}
      - name: Edit version
        run: |
          echo "current ref ${{ github.ref }}"
          cargo run -p edit_version -- ${{ github.ref }}
      - name: Build - General
        if: ${{ matrix.cross == 'general' }}
        run: |
          rustup target add ${{ matrix.target }}
          cargo build --release --target ${{ matrix.target }} -p ${{ matrix.crate }}
      - name: Build - zigbuild
        if: ${{ matrix.cross == 'zigbuild' }}
        run: |
          rustup target add ${{ matrix.target }}
          cargo install --locked cargo-zigbuild
          pip3 install ziglang
          cargo zigbuild --release --target ${{ matrix.target }}.${{ matrix.glibc }} -p ${{ matrix.crate }}
      - name: Copy binary (Linux)
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          mkdir -p ${{ github.workspace }}/artifact/
          cp ${{ github.workspace }}/target/${{ matrix.target }}/release/${{ matrix.crate }} ${{ github.workspace }}/artifact/${{ matrix.output }}
      - name: Copy binary (Windows)
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}/artifact/"
          Copy-Item "${{ github.workspace }}/target/${{ matrix.target }}/release/${{ matrix.crate }}.exe" "${{ github.workspace }}/artifact/${{ matrix.output }}.exe"
      - name: Upload
        if: ${{ matrix.cross != 'zigbuild' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}-${{ matrix.platform }}
          path: ${{ github.workspace }}/artifact/
      - name: Upload zigbuild
        if: ${{ matrix.cross == 'zigbuild' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}-${{ matrix.platform }}-glibc.${{ matrix.glibc }}
          path: ${{ github.workspace }}/artifact/

  publish-crates:
    name: Publish Cargo crates
    needs: [build-release]
    if: startsWith(github.ref, 'refs/tags/') && (endsWith(github.ref_name, '.0') || (github.event_name == 'workflow_dispatch' && github.event.inputs.channel == 'stable'))
    runs-on: ubuntu-latest
    env:
      CARGO_TOKEN: ${{ secrets.CARGO_TOKEN }}
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
    steps:
      - name: Verify publish token
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${CARGO_TOKEN}" ]]; then
            echo "::error::CARGO_TOKEN is required for this publish-crates run."
            exit 1
          fi
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Set version
        run: |
          echo "current ref ${{ github.ref }}"
          cargo run -p edit_version -- ${{ github.ref }}
      - name: Publish crates
        run: |
          set -euo pipefail

          publish_with_retry() {
            local manifest_path="$1"
            local attempts=10
            local delay=30
            local package_name
            local package_version

            mapfile -t package_info < <(
              python3 -c "import sys, tomllib; manifest = tomllib.load(open(sys.argv[1], 'rb')); print(manifest['package']['name']); print(manifest['package']['version'])" "$manifest_path"
            )

            package_name="${package_info[0]}"
            package_version="${package_info[1]}"

            if curl -fsS "https://crates.io/api/v1/crates/${package_name}/${package_version}" >/dev/null; then
              echo "${package_name} ${package_version} is already published, skipping"
              return 0
            fi

            for attempt in $(seq 1 "$attempts"); do
              if cargo publish --manifest-path "$manifest_path" --allow-dirty; then
                return 0
              fi

              if [ "$attempt" -eq "$attempts" ]; then
                echo "Failed to publish $manifest_path after $attempts attempts" >&2
                return 1
              fi

              echo "Publish failed for $manifest_path, retrying in ${delay}s (attempt $attempt/$attempts)"
              sleep "$delay"
            done
          }

          # Publish only the public crates we ship plus the internal crates they require.
          publish_with_retry crates/glua_parser/Cargo.toml
          publish_with_retry crates/glua_diagnostic_macro/Cargo.toml
          publish_with_retry crates/schema_to_glua/Cargo.toml
          publish_with_retry crates/glua_parser_desc/Cargo.toml
          publish_with_retry crates/glua_code_analysis/Cargo.toml
          publish_with_retry crates/glua_ls/Cargo.toml
          publish_with_retry crates/glua_check/Cargo.toml

  release:
    needs: [build-release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
      - name: Add execute permission and compress (Linux)
        run: |
          chmod +x glua_ls-linux-x64/glua_ls
          chmod +x glua_ls-linux-x64-glibc.2.17/glua_ls
          chmod +x glua_check-linux-x64/glua_check

          tar -zcvf glua_ls-linux-x64.tar.gz        -C glua_ls-linux-x64        glua_ls
          tar -zcvf glua_ls-linux-x64-glibc.2.17.tar.gz -C glua_ls-linux-x64-glibc.2.17 glua_ls
          tar -zcvf glua_check-linux-x64.tar.gz     -C glua_check-linux-x64     glua_check
      - name: Add execute permission and compress (experimental macOS)
        run: |
          package_macos_artifact() {
            local artifact_dir="$1"
            local binary_name="$2"
            local archive_name="$3"
            local binary_path="${artifact_dir}/${binary_name}"

            if [[ ! -f "${binary_path}" ]]; then
              echo "::warning::Skipping missing experimental macOS artifact: ${binary_path}"
              return 0
            fi

            chmod +x "${binary_path}"
            tar -zcvf "${archive_name}" -C "${artifact_dir}" "${binary_name}"
          }

          package_macos_artifact glua_ls-darwin-x64-experimental glua_ls glua_ls-darwin-x64-experimental.tar.gz
          package_macos_artifact glua_ls-darwin-arm64-experimental glua_ls glua_ls-darwin-arm64-experimental.tar.gz
          package_macos_artifact glua_check-darwin-x64-experimental glua_check glua_check-darwin-x64-experimental.tar.gz
          package_macos_artifact glua_check-darwin-arm64-experimental glua_check glua_check-darwin-arm64-experimental.tar.gz
      - name: Compress (Windows)
        run: |
          cd glua_ls-win32-x64
          7z a glua_ls-win32-x64.zip glua_ls.exe
          cd ../glua_check-win32-x64
          7z a glua_check-win32-x64.zip glua_check.exe
      - name: Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_CHANNEL_OVERRIDE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.channel || '' }}
          RELEASE_VERSION_OVERRIDE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || '' }}
        run: |
          set -euo pipefail

          repo="${{ github.repository }}"
          tag_ref="${{ github.ref_name }}"
          tag="${tag_ref}"
          if ! [[ "$tag" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '${tag_ref}' must be semver (example: 1.0.4)." >&2
            exit 1
          fi

          if [[ -n "${RELEASE_VERSION_OVERRIDE}" && "${RELEASE_VERSION_OVERRIDE}" != "${tag}" ]]; then
            echo "Manual version '${RELEASE_VERSION_OVERRIDE}' does not match tag '${tag}'." >&2
            exit 1
          fi

          release_flags=()
          case "${RELEASE_CHANNEL_OVERRIDE}" in
            stable)
              release_kind="stable"
              ;;
            prerelease)
              release_flags+=(--prerelease)
              release_kind="prerelease"
              ;;
            "")
              IFS='.' read -r _ _ patch <<< "$tag"
              release_kind="stable"
              if (( patch != 0 )); then
                release_flags+=(--prerelease)
                release_kind="prerelease"
              fi
              ;;
            *)
              echo "Unknown RELEASE_CHANNEL_OVERRIDE '${RELEASE_CHANNEL_OVERRIDE}'." >&2
              exit 1
              ;;
          esac

          echo "Publishing ${release_kind} release for tag ${tag_ref}"

          title="gmod-glua-ls ${tag_ref}"
          assets=(
            "glua_ls-win32-x64/glua_ls-win32-x64.zip"
            "glua_check-win32-x64/glua_check-win32-x64.zip"
            "glua_ls-linux-x64.tar.gz"
            "glua_ls-linux-x64-glibc.2.17.tar.gz"
            "glua_check-linux-x64.tar.gz"
            "glua_ls-darwin-x64-experimental.tar.gz"
            "glua_ls-darwin-arm64-experimental.tar.gz"
            "glua_check-darwin-x64-experimental.tar.gz"
            "glua_check-darwin-arm64-experimental.tar.gz"
          )

          upload_assets=()
          for asset in "${assets[@]}"; do
            if [[ -f "$asset" ]]; then
              upload_assets+=("$asset")
              continue
            fi

            if [[ "$asset" == *darwin* ]]; then
              echo "::warning::Skipping missing experimental macOS release asset: $asset"
              continue
            fi

            echo "Required release asset is missing: $asset" >&2
            exit 1
          done

          if draft_state="$(gh release view "$tag_ref" --repo "$repo" --json isDraft --jq '.isDraft' 2>/dev/null)"; then
            if [ "$draft_state" = "true" ]; then
              gh release upload "$tag_ref" --repo "$repo" "${upload_assets[@]}" --clobber
              gh release edit "$tag_ref" --repo "$repo" --draft=false --title "$title" "${release_flags[@]}"
            else
              echo "Release '$tag_ref' already exists and is published. Immutable releases cannot be modified; publish a new tag instead." >&2
              exit 1
            fi
          else
            gh release create "$tag_ref" --repo "$repo" "${upload_assets[@]}" --verify-tag --title "$title" "${release_flags[@]}" --generate-notes
          fi
